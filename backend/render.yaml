services:
  - type: web
    name: ckdpredict-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python seed.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://ckdpredict-web.vercel.app   # update after Vercel deploy
      - key: DATABASE_URL
        fromDatabase:
          name: ckdpredict-db
          property: connectionString

databases:
  - name: ckdpredict-db
    plan: free
